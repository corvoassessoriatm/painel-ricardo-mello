name: Atualizar dados Meta Ads

on:
  schedule:
    # 2x por hora, em minutos FORA do topo da hora (:00 é o mais congestionado
    # no scheduler do GitHub e costuma ser atrasado ou pulado). :17 e :47 disparam
    # de forma muito mais confiavel. UTC.
    - cron: "17,47 * * * *"
  workflow_dispatch:            # botão "Run workflow" manual

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Puxar Meta Ads e gerar data.json
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
          AD_ACCOUNT_ID: ${{ secrets.AD_ACCOUNT_ID }}
        run: node scripts/fetch-meta.mjs

      - name: Commit se houver mudança
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json thumbs 2>/dev/null || git add data.json
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: atualiza data.json + capas ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          else
            echo "Sem mudança nos dados."
          fi
