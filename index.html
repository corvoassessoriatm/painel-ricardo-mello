<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Painel Ricardo Mello · Exponential</title>
<style>
  :root{
    --plane:#eef1f5;--surface:#fff;--surface-2:#f7f9fb;--ink:#0d1017;--ink-2:#535a66;--muted:#868d99;
    --border:rgba(13,16,23,.10);--border-2:rgba(13,16,23,.16);
    --accent:#2a78d6;--accent-ink:#1c5cab;--accent-wash:rgba(42,120,214,.10);
    --good:#0ca30c;--good-ink:#0a7c0a;--good-wash:rgba(12,163,12,.11);
    --warn:#b4790a;--warn-wash:rgba(230,157,20,.14);
    --crit:#d03b3b;--crit-ink:#b32a2a;--crit-wash:rgba(208,59,59,.11);
    --grid:#e4e7ec;--axis:#c3c7cf;--area-top:rgba(42,120,214,.28);--area-bot:rgba(42,120,214,.02);
    --header:#12151b;--header-ink:#eef1f5;--header-sub:#9aa2af;
    --shadow:0 1px 2px rgba(13,16,23,.05),0 10px 28px rgba(13,16,23,.055);--r:14px;
  }
  @media (prefers-color-scheme:dark){:root{
    --plane:#0a0c10;--surface:#15181e;--surface-2:#1a1e25;--ink:#f1f3f7;--ink-2:#a7aeba;--muted:#7c838f;
    --border:rgba(255,255,255,.10);--border-2:rgba(255,255,255,.17);
    --accent:#3d8bea;--accent-ink:#82b4f1;--accent-wash:rgba(61,139,234,.16);
    --good:#28b828;--good-ink:#54cf54;--good-wash:rgba(40,184,40,.16);
    --warn:#e0a52a;--warn-wash:rgba(224,165,42,.16);--crit:#e86b6b;--crit-ink:#f08a8a;--crit-wash:rgba(232,107,107,.16);
    --grid:#282c33;--axis:#3a3f48;--area-top:rgba(61,139,234,.34);--area-bot:rgba(61,139,234,.02);
    --header:#0d0f13;--header-ink:#eef1f5;--header-sub:#8b93a0;--shadow:0 1px 2px rgba(0,0,0,.45),0 10px 28px rgba(0,0,0,.4);
  }}
  :root[data-theme="dark"]{--plane:#0a0c10;--surface:#15181e;--surface-2:#1a1e25;--ink:#f1f3f7;--ink-2:#a7aeba;--muted:#7c838f;--border:rgba(255,255,255,.10);--border-2:rgba(255,255,255,.17);--accent:#3d8bea;--accent-ink:#82b4f1;--accent-wash:rgba(61,139,234,.16);--good:#28b828;--good-ink:#54cf54;--good-wash:rgba(40,184,40,.16);--warn:#e0a52a;--warn-wash:rgba(224,165,42,.16);--crit:#e86b6b;--crit-ink:#f08a8a;--crit-wash:rgba(232,107,107,.16);--grid:#282c33;--axis:#3a3f48;--area-top:rgba(61,139,234,.34);--area-bot:rgba(61,139,234,.02);--header:#0d0f13;--header-ink:#eef1f5;--header-sub:#8b93a0;--shadow:0 1px 2px rgba(0,0,0,.45),0 10px 28px rgba(0,0,0,.4);}
  :root[data-theme="light"]{--plane:#eef1f5;--surface:#fff;--surface-2:#f7f9fb;--ink:#0d1017;--ink-2:#535a66;--muted:#868d99;--border:rgba(13,16,23,.10);--border-2:rgba(13,16,23,.16);--accent:#2a78d6;--accent-ink:#1c5cab;--accent-wash:rgba(42,120,214,.10);--good:#0ca30c;--good-ink:#0a7c0a;--good-wash:rgba(12,163,12,.11);--warn:#b4790a;--warn-wash:rgba(230,157,20,.14);--crit:#d03b3b;--crit-ink:#b32a2a;--crit-wash:rgba(208,59,59,.11);--grid:#e4e7ec;--axis:#c3c7cf;--area-top:rgba(42,120,214,.28);--area-bot:rgba(42,120,214,.02);--header:#12151b;--header-ink:#eef1f5;--header-sub:#9aa2af;--shadow:0 1px 2px rgba(13,16,23,.05),0 10px 28px rgba(13,16,23,.055);}

  *{box-sizing:border-box}
  body{margin:0;background:var(--plane);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.45}
  .tnum{font-variant-numeric:tabular-nums}
  .wrap{max-width:1320px;margin:0 auto;padding:0 22px 72px}
  header.top{background:var(--header);color:var(--header-ink);position:sticky;top:0;z-index:20;border-bottom:1px solid rgba(255,255,255,.06)}
  .top-in{max-width:1320px;margin:0 auto;padding:13px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px}
  .raven{width:32px;height:32px}
  .brand h1{font-size:14.5px;margin:0;font-weight:650;letter-spacing:.2px}
  .brand .sub{font-size:11.5px;color:var(--header-sub);margin-top:1px}
  .top-right{margin-left:auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .mi{font-size:11px;color:var(--header-sub);line-height:1.25}
  .mi b{display:block;color:var(--header-ink);font-size:12px;font-weight:600}
  .live{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--header-sub)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--good);box-shadow:0 0 0 3px var(--good-wash)}
  .tbtn{background:rgba(255,255,255,.08);color:var(--header-ink);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:7px 11px;font-size:12px;cursor:pointer;font-family:inherit}
  .tbtn:hover{background:rgba(255,255,255,.15)}

  .controls{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin:20px 0 16px}
  .seg{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:4px;box-shadow:var(--shadow);flex-wrap:wrap}
  .seg button{border:0;background:transparent;color:var(--ink-2);font-family:inherit;font-size:12.5px;font-weight:550;padding:8px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap}
  .seg button .cnt{font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums}
  .seg button:hover{background:var(--surface-2);color:var(--ink)}
  .seg button[aria-selected="true"]{background:var(--accent);color:#fff}
  .seg button[aria-selected="true"] .cnt{color:rgba(255,255,255,.82)}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:650;padding-left:2px}
  select{font-family:inherit;font-size:12.5px;color:var(--ink);background:var(--surface);border:1px solid var(--border-2);border-radius:9px;padding:9px 12px;cursor:pointer;min-width:180px;box-shadow:var(--shadow)}
  .spacer{flex:1}
  .periodseg{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:4px;box-shadow:var(--shadow)}
  .periodseg button{border:0;background:transparent;color:var(--ink-2);font-family:inherit;font-size:12px;font-weight:600;padding:8px 11px;border-radius:8px;cursor:pointer;white-space:nowrap}
  .periodseg button[aria-selected="true"]{background:var(--ink);color:var(--surface)}

  .kpis{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;margin-bottom:14px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px;box-shadow:var(--shadow)}
  .kpi .k{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:650;display:flex;align-items:center;gap:4px}
  .kpi .v{font-size:19px;font-weight:680;margin-top:5px;letter-spacing:-.4px}
  .kpi .s{font-size:10.5px;color:var(--ink-2);margin-top:2px}
  .info{width:13px;height:13px;border-radius:50%;border:1px solid var(--border-2);color:var(--muted);font-size:9px;display:inline-flex;align-items:center;justify-content:center;cursor:help;font-weight:700}

  .obj{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:var(--r);box-shadow:var(--shadow);padding:16px 20px;margin-bottom:14px;display:flex;gap:20px;align-items:center;flex-wrap:wrap}
  .obj.warn{border-left-color:var(--warn)}.obj.good{border-left-color:var(--good)}
  .obj .eye{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:650;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .obj .ttl{font-size:17px;font-weight:650;margin:3px 0 2px;letter-spacing:-.2px}
  .obj .nt{font-size:12.5px;color:var(--ink-2);max-width:74ch}
  .obj .big{margin-left:auto;text-align:right}
  .obj .big .v{font-size:28px;font-weight:700;letter-spacing:-.5px}
  .obj .big .l{font-size:11px;color:var(--muted)}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:650;padding:3px 9px;border-radius:999px}
  .pill.good{background:var(--good-wash);color:var(--good-ink)}.pill.warn{background:var(--warn-wash);color:var(--warn)}

  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);padding:18px 20px;margin-bottom:14px}
  .phead{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .phead h3{font-size:13.5px;font-weight:650;margin:0}
  .psub{font-size:11.5px;color:var(--muted);margin-top:2px}
  .miniseg{display:flex;gap:3px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:3px}
  .miniseg button{border:0;background:transparent;color:var(--ink-2);font-family:inherit;font-size:11.5px;font-weight:600;padding:5px 10px;border-radius:6px;cursor:pointer}
  .miniseg button[aria-selected="true"]{background:var(--accent);color:#fff}
  svg.trend{width:100%;height:auto;display:block}
  .tt{position:fixed;pointer-events:none;background:var(--surface);border:1px solid var(--border-2);border-radius:9px;box-shadow:var(--shadow);padding:8px 11px;font-size:11.5px;opacity:0;transition:opacity .1s;z-index:30}
  .tt .d{color:var(--muted);font-size:10.5px;margin-bottom:2px}.tt .m{font-weight:650;font-size:13px;font-variant-numeric:tabular-nums}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
  .grid2 .panel{margin-bottom:0}
  .bar-row{display:grid;grid-template-columns:120px 1fr auto;align-items:center;gap:10px;margin-bottom:10px}
  .bar-row .lbl{font-size:11.5px;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar-track{height:19px;background:var(--surface-2);border-radius:5px;overflow:hidden;border:1px solid var(--border)}
  .bar-fill{height:100%;background:var(--accent);border-radius:4px 5px 5px 4px;min-width:3px;transition:width .5s cubic-bezier(.2,.7,.3,1)}
  .bar-row .val{font-size:11.5px;font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap}

  .tblwrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
  .tblhead{padding:16px 20px 12px;display:flex;gap:12px;align-items:baseline;flex-wrap:wrap}
  .tblhead h3{font-size:14px;margin:0;font-weight:650}
  .tblhead .sub{font-size:11.5px;color:var(--muted)}
  .scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  thead th{text-align:right;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:650;padding:9px 14px;border-bottom:1px solid var(--border);background:var(--surface-2);white-space:nowrap;cursor:pointer;user-select:none}
  thead th:first-child{text-align:left}
  thead th.sorted{color:var(--accent-ink)}
  tbody td{padding:10px 14px;text-align:right;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums;white-space:nowrap}
  tbody td:first-child{text-align:left;white-space:normal;min-width:210px}
  tbody tr:last-child td{border-bottom:0}
  tbody tr:hover{background:var(--surface-2)}
  tbody tr.best,tbody tr.best:hover{background:var(--accent-wash)}
  .crn{font-weight:550;display:flex;align-items:center;gap:8px}
  .cfull{font-size:12px;font-weight:600;color:var(--ink);word-break:break-word;font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;letter-spacing:-.2px}
  .star{color:var(--accent-ink);font-size:10px;font-weight:700;background:var(--accent-wash);padding:2px 7px;border-radius:999px;flex:0 0 auto}
  .tag{font-size:10px;color:var(--muted)}
  .st{font-size:10px;font-weight:650;padding:2px 8px;border-radius:999px}
  .st.on{background:var(--good-wash);color:var(--good-ink)}.st.off{background:rgba(134,141,153,.16);color:var(--muted)}
  .bk{font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;background:var(--accent-wash);color:var(--accent-ink)}
  .empty{padding:34px 20px;text-align:center;color:var(--muted);font-size:13px}
  .mini{font-size:10px;color:var(--muted)}
  .notes{margin-top:20px;font-size:11.5px;color:var(--muted);line-height:1.65}
  .notes b{color:var(--ink-2)}.notes .row{display:flex;gap:8px;padding:3px 0}.notes .row span:first-child{color:var(--accent-ink);flex:0 0 auto}
  .err{background:var(--crit-wash);color:var(--crit-ink);border:1px solid var(--crit);border-radius:12px;padding:14px 18px;font-size:13px;margin:20px 0}
  @media (max-width:1080px){.kpis{grid-template-columns:repeat(4,1fr)}.grid2{grid-template-columns:1fr}}
  @media (max-width:560px){.kpis{grid-template-columns:repeat(2,1fr)}.obj .big{margin-left:0;text-align:left}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header class="top">
  <div class="top-in">
    <div class="brand">
      <svg class="raven" viewBox="0 0 48 48" fill="none" aria-hidden="true"><path d="M8 30c0-9 7-16 16-16 4 0 6-2 9-4-1 4-1 6-3 8 5 1 9 5 9 11 0 2-1 4-2 5l3 2-5 1 1 3-4-2c-2 1-4 1-6 1-9 0-18-5-18-13z" fill="#3d8bea"/><circle cx="30" cy="24" r="1.6" fill="#fff"/><path d="M8 30c3 2 7 3 11 3" stroke="#0d0f13" stroke-width="1.4" stroke-linecap="round"/></svg>
      <div><h1>Ricardo Mello · Exponential</h1><div class="sub">Painel de performance · Corvo Assessoria</div></div>
    </div>
    <div class="top-right">
      <div class="mi">Conta Meta Ads<b class="tnum" id="acc">—</b></div>
      <div class="mi">Atualizado<b id="upd">—</b></div>
      <span class="live"><span class="dot"></span> auto-atualiza 1h</span>
      <button class="tbtn" id="themeBtn" type="button">◐ Tema</button>
    </div>
  </div>
</header>
<div class="wrap"><div id="app"></div></div>
<div class="tt" id="tt"></div>
<script>
const BRL=n=>"R$ "+(n||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
const BRL0=n=>"R$ "+Math.round(n||0).toLocaleString("pt-BR");
const NUM=n=>(n||0).toLocaleString("pt-BR");
const PCT=n=>(n||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})+"%";
const DEC=n=>(n||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});

const PERIODS=[["today","Hoje"],["yesterday","Ontem"],["last_7d","7 dias"],["last_30d","30 dias"],["last_90d","90 dias"]];
const PERIOD_DAYS={today:14,yesterday:14,last_7d:7,last_30d:30,last_90d:90};
const PRIMARY={vendas:{key:"pu",label:"Compras",unit:"compras",micro:true},conteudo:{key:"tp",label:"ThruPlays",unit:"ThruPlays",micro:false},seguidores:{key:"ig",label:"Visitas ao perfil",unit:"visitas",micro:false},leads:{key:"le",label:"Leads",unit:"leads",micro:false},whatsapp:{key:"msg",label:"Conversas",unit:"conversas",micro:false},trafego:{key:"lc",label:"Cliques no link",unit:"cliques",micro:false}};
const BUCKETS=["vendas","conteudo","seguidores","leads","whatsapp","trafego"];
const BKL={vendas:"Vendas",conteudo:"Conteúdo",seguidores:"Seguidores",leads:"Leads",whatsapp:"WhatsApp",trafego:"Tráfego"};

let DATA=null,CMETA={},state={action:"geral",product:"all",period:"last_30d"};

function classify(cid){
  const c=CMETA[cid]||{name:cid,objective:""};
  const n=(c.name||"").toUpperCase(),o=c.objective||"";
  let b;
  if(/WHATS|MENSAG|MESSAG/.test(n))b="whatsapp";
  else if(/\bVV\b|THRUPLAY/.test(n)||o==="OUTCOME_ENGAGEMENT")b="conteudo";
  else if(/SEGUIDOR/.test(n))b="seguidores";
  else if(/LEAD/.test(n)||o==="OUTCOME_LEADS")b="leads";
  else if(/VENDAS|COMPRA|LOWTICKET|CHECKOUT/.test(n)||o==="OUTCOME_SALES")b="vendas";
  else if(/EVENTO|TRAFEGO|CLIQUES/.test(n)||o==="LINK_CLICKS")b="trafego";
  else b="trafego";
  let p="Outros";
  if(/EMPRESARIOCTEMPO|EMPRESARIO/.test(n))p="Empresário c/ Tempo";
  else if(/MANUALPME/.test(n))p="Manual PME";
  else if(/IMERSAO/.test(n))p="Imersão";
  else if(/LOWTICKET/.test(n))p="Low Ticket";
  else if(/SEGUIDOR/.test(n))p="Perfil / Seguidores";
  else if(/EVENTO|REFORMATRIB/.test(n))p="Evento presencial";
  else if(/\bVV\b|INDUSTRIA/.test(n)&&b==="conteudo")p="Conteúdo Indústrias";
  return {bucket:b,product:p,name:c.name};
}
function adMetrics(a){
  const c=classify(a.campaign_id),act=a.act||{},v=a.vid||null,P=PRIMARY[c.bucket];
  return {...a,bucket:c.bucket,product:c.product,cname:c.name,
    ctr:a.impr?a.clicks/a.impr*100:0,cpc:a.clicks?a.spend/a.clicks:0,cpm:a.impr?a.spend/a.impr*1000:0,
    objV:act[P.key]||0,objLabel:P.label,fo:act.fo||0,leadN:act.le||0,
    hook:v&&a.impr?v.h/a.impr*100:null,thruRate:v&&a.impr?v.tp/a.impr*100:null,vid:v};
}
function ads(){return (DATA.periods[state.period]?.ads||[]).map(adMetrics);}
function scoped(list){return list.filter(x=>(state.action==="geral"||x.bucket===state.action)&&(state.product==="all"||x.product===state.product));}
function campaignsAgg(list){
  const m={};
  list.forEach(a=>{const k=a.campaign_id;if(!m[k])m[k]={id:k,name:a.cname,bucket:a.bucket,product:a.product,spend:0,impr:0,reach:0,clicks:0,objV:0,fo:0,leadN:0,anyActive:false};
    const c=m[k];c.spend+=a.spend;c.impr+=a.impr;c.reach+=a.reach;c.clicks+=a.clicks;c.objV+=a.objV;c.fo+=a.fo;c.leadN+=a.leadN;if(a.status==="ACTIVE")c.anyActive=true;});
  return Object.values(m).map(c=>({...c,ctr:c.impr?c.clicks/c.impr*100:0,cpc:c.clicks?c.spend/c.clicks:0,cpm:c.impr?c.spend/c.impr*1000:0,objLabel:PRIMARY[c.bucket].label})).sort((a,b)=>b.spend-a.spend);
}
function agg(list){const t={spend:0,impr:0,reach:0,clicks:0,objV:0,leadN:0,fo:0,pu:0};
  list.forEach(c=>{t.spend+=c.spend;t.impr+=c.impr;t.reach+=c.reach;t.clicks+=c.clicks;t.objV+=c.objV;t.leadN+=c.leadN;t.fo+=c.fo;t.pu+=((c.act&&c.act.pu)||0);});
  t.ctr=t.impr?t.clicks/t.impr*100:0;t.cpc=t.clicks?t.spend/t.clicks:0;t.cpm=t.impr?t.spend/t.impr*1000:0;t.freq=t.reach?t.impr/t.reach:0;return t;}

function boot(d){
  DATA=d; d.campaigns.forEach(c=>CMETA[c.id]=c);
  state.period=d.meta.default_period||"last_30d";
  document.getElementById("acc").textContent=d.meta.account_id;
  const dt=new Date(d.meta.updated_at);
  const f=isNaN(dt)?d.meta.updated_at:dt.toLocaleString("pt-BR",{timeZone:"America/Sao_Paulo",day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit",hour12:true});
  document.getElementById("upd").textContent=f+" (Brasília)"+(d.meta.seed?" · partida":"");
  render();
}

let trendMetric="spend";
function render(){
  const A=ads(),cs=scoped(A),camps=campaignsAgg(cs),t=agg(cs);
  document.getElementById("app").innerHTML=`
    <div class="controls">
      <div class="seg" id="seg" role="tablist" aria-label="Ação"></div>
      <div class="field"><label for="prod">Produto / oferta</label><select id="prod"></select></div>
      <div class="spacer"></div>
      <div class="field"><label>Período</label><div class="periodseg" id="perseg" role="tablist"></div></div>
    </div>
    <div id="obj"></div>
    <div class="kpis" id="kpis"></div>
    <div class="panel"><div class="phead"><div><h3>Tendência diária</h3><div class="psub" id="trendSub"></div></div><div class="miniseg" id="trendSeg"></div></div><div id="trend"></div></div>
    ${state.action==="geral"?`<div class="grid2">
      <div class="panel"><div class="phead"><div><h3>Gasto por ação</h3><div class="psub">Distribuição do investimento</div></div></div><div id="c1"></div></div>
      <div class="panel"><div class="phead"><div><h3>Resultados por objetivo</h3><div class="psub">Volume no período (escalas distintas)</div></div></div><div id="c2"></div></div>
    </div>`:""}
    <div class="tblwrap"><div class="tblhead"><h3>Campanhas — nome completo</h3><span class="sub" id="campsub"></span></div><div class="scroll"><table id="ctbl"></table></div></div>
    <div class="tblwrap"><div class="tblhead"><h3>Criativos ${state.action==="geral"?"":"· "+BKL[state.action]}</h3><span class="sub" id="crsub"></span></div><div class="scroll"><table id="crtbl"></table></div></div>
    <div id="vidwrap"></div>
    ${notes()}`;
  renderSeg();syncProd();renderPeriod();
  renderObj(t);renderKPIs(t);
  renderTrendSeg();renderTrend();
  if(state.action==="geral")renderOverviewCharts(A);
  renderCampTable(camps);
  renderCrTable(cs);
  renderVideoTable(cs);
}
function renderSeg(){
  const A=ads(),seg=document.getElementById("seg");
  const tabs=[["geral","Visão geral",new Set(A.map(a=>a.campaign_id)).size],...BUCKETS.map(b=>[b,BKL[b],new Set(A.filter(a=>a.bucket===b).map(a=>a.campaign_id)).size])];
  seg.innerHTML=tabs.map(([k,l,n])=>`<button role="tab" aria-selected="${state.action===k}" data-a="${k}">${l}<span class="cnt">${n}</span></button>`).join("");
  seg.querySelectorAll("button").forEach(b=>b.onclick=()=>{state.action=b.dataset.a;state.product="all";render();});
}
function syncProd(){
  const A=ads(),sel=document.getElementById("prod");
  const pool=state.action==="geral"?A:A.filter(a=>a.bucket===state.action);
  const prods=[...new Set(pool.map(a=>a.product))];
  sel.innerHTML=`<option value="all">Todos os produtos</option>`+prods.map(p=>`<option value="${p}">${p}</option>`).join("");
  sel.value=state.product;sel.onchange=()=>{state.product=sel.value;render();};
}
function renderPeriod(){
  const el=document.getElementById("perseg");
  el.innerHTML=PERIODS.map(([k,l])=>`<button role="tab" aria-selected="${state.period===k}" data-p="${k}">${l}</button>`).join("");
  el.querySelectorAll("button").forEach(b=>b.onclick=()=>{state.period=b.dataset.p;render();});
}
function renderObj(t){
  const el=document.getElementById("obj");
  if(state.action==="geral"){
    const vend=agg(scoped(ads()).filter(a=>a.bucket==="vendas"));
    el.className="obj";
    el.innerHTML=`<div><div class="eye">Visão consolidada · ${campaignsAgg(scoped(ads())).length} campanhas · ${PERIODS.find(p=>p[0]===state.period)[1]}</div>
      <div class="ttl">Conteúdo e topo de funil entregam; venda direta ainda cara</div>
      <div class="nt">Maior parte do investimento em <b>Vendas</b> (${BRL0(vend.spend)}), mas o objetivo de compra dispara pouco — o painel usa o CTR como sinal. <b>Conteúdo</b> e <b>Seguidores</b> batem objetivo com folga.</div></div>
      <div class="big"><div class="v tnum">${BRL0(t.spend)}</div><div class="l">investidos no período</div></div>`;
    return;
  }
  const P=PRIMARY[state.action];
  if(t.spend===0){el.className="obj";el.innerHTML=`<div><div class="eye">${BKL[state.action]}</div><div class="ttl">Sem veiculação neste período</div><div class="nt">Não houve gasto em ${BKL[state.action]} no período selecionado. Troque o período (ex.: 90 dias) para ver histórico, ou aguarde novas campanhas.</div></div><div class="big"><div class="v">—</div><div class="l">${P.unit}</div></div>`;return;}
  const fired=t.objV>0,micro=P.micro&&t.objV<=5,fb=!fired||micro;
  el.className="obj "+(fb?"warn":"good");
  const badge=fb?`<span class="pill warn">▲ objetivo abaixo do esperado</span>`:`<span class="pill good">✓ objetivo entregue</span>`;
  const nt=fb?`Objetivo <b>${P.label}</b> ${t.objV===0?"não disparou":"disparou volume baixo ("+NUM(t.objV)+")"}. Exibindo <b>CTR e gasto por criativo</b> como sinal de tração.`:`Objetivo <b>${P.label}</b> entregue a <b>${BRL(t.spend/t.objV)}</b> por resultado.`;
  el.innerHTML=`<div><div class="eye">${BKL[state.action]} · objetivo pela nomenclatura ${badge}</div><div class="ttl">${P.label}${fb?" · fallback CTR ativo":""}</div><div class="nt">${nt}</div></div><div class="big"><div class="v tnum">${fb?PCT(t.ctr):NUM(t.objV)}</div><div class="l">${fb?"CTR médio":P.label}</div></div>`;
}
function renderKPIs(t){
  const el=document.getElementById("kpis");
  const objCard=state.action==="geral"?{k:"Compras (pixel)",v:NUM(t.pu),s:NUM(t.leadN)+" leads"}:{k:PRIMARY[state.action].label,v:t.objV>0?NUM(t.objV):"—",s:t.objV>0?BRL(t.spend/t.objV)+" / result.":"ver CTR"};
  const cards=[
    {k:"Investimento",v:BRL0(t.spend),s:campaignsAgg(scoped(ads())).length+" campanhas"},
    objCard,
    {k:"Alcance",v:NUM(t.reach),s:NUM(t.impr)+" impr.",info:"Soma por campanha; há sobreposição de públicos."},
    {k:"Seguidores",v:NUM(t.fo),s:"atribuídos aos anúncios",info:"Seguidores/curtidas de página atribuídos (actions:like). Traffic p/ Instagram raramente atribui follows — por isso costuma vir dos criativos de vídeo."},
    {k:"CTR",v:PCT(t.ctr),s:NUM(t.clicks)+" cliques"},
    {k:"CPC",v:BRL(t.cpc),s:"por clique"},
    {k:"CPM",v:BRL(t.cpm),s:"por mil impr."},
    {k:"Frequência",v:DEC(t.freq),s:"impr. / pessoa"},
  ];
  el.innerHTML=cards.map(c=>`<div class="kpi"><div class="k">${c.k}${c.info?`<span class="info" title="${c.info}">i</span>`:""}</div><div class="v tnum">${c.v}</div><div class="s">${c.s}</div></div>`).join("");
}
// trend
const TM={spend:{l:"Gasto",fmt:BRL0,f:d=>d.spend},impr:{l:"Impressões",fmt:NUM,f:d=>d.impr},clicks:{l:"Cliques",fmt:NUM,f:d=>d.clicks},ctr:{l:"CTR",fmt:PCT,f:d=>d.impr?d.clicks/d.impr*100:0}};
function renderTrendSeg(){const el=document.getElementById("trendSeg");el.innerHTML=Object.entries(TM).map(([k,v])=>`<button aria-selected="${trendMetric===k}" data-m="${k}">${v.l}</button>`).join("");el.querySelectorAll("button").forEach(b=>b.onclick=()=>{trendMetric=b.dataset.m;renderTrendSeg();renderTrend();});}
function mavg(v,w){return v.map((_,i)=>{const s=v.slice(Math.max(0,i-w+1),i+1);return s.reduce((a,b)=>a+b,0)/s.length;});}
function renderTrend(){
  const n=PERIOD_DAYS[state.period]||30, daily=DATA.daily.slice(-n), M=TM[trendMetric];
  const W=1000,H=280,ml=64,mr=16,mt=14,mb=26,pw=W-ml-mr,ph=H-mt-mb;
  const vals=daily.map(M.f),avg=mavg(vals,7),max=Math.max(...vals,...avg)*1.08||1;
  const x=i=>ml+(daily.length<=1?pw/2:i/(daily.length-1)*pw),y=v=>mt+ph-(v/max)*ph;
  const line=a=>a.map((v,i)=>`${i?"L":"M"}${x(i).toFixed(1)} ${y(v).toFixed(1)}`).join(" ");
  const area=`M${x(0).toFixed(1)} ${(mt+ph)} `+vals.map((v,i)=>`L${x(i).toFixed(1)} ${y(v).toFixed(1)}`).join(" ")+` L${x(vals.length-1).toFixed(1)} ${(mt+ph)} Z`;
  let gl="";for(let i=0;i<=4;i++){const v=max*i/4,yy=y(v);gl+=`<line x1="${ml}" y1="${yy.toFixed(1)}" x2="${W-mr}" y2="${yy.toFixed(1)}" stroke="var(--grid)"/><text x="${ml-8}" y="${(yy+3.5).toFixed(1)}" text-anchor="end" font-size="11" fill="var(--muted)">${M.fmt(v).replace("R$ ","R$")}</text>`;}
  let xl="";const st=Math.max(1,Math.ceil(daily.length/6));for(let i=0;i<daily.length;i+=st){xl+=`<text x="${x(i).toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="10.5" fill="var(--muted)">${daily[i].d.slice(5).split("-").reverse().join("/")}</text>`;}
  const last=vals.length-1;
  document.getElementById("trend").innerHTML=`<svg class="trend" viewBox="0 0 ${W} ${H}" id="tsvg" role="img" aria-label="Tendência de ${M.l}">
    ${gl}<path d="${area}" fill="url(#ag)"/><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--area-top)"/><stop offset="1" stop-color="var(--area-bot)"/></linearGradient>
    <path d="${line(vals)}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/><path d="${line(avg)}" fill="none" stroke="var(--accent-ink)" stroke-width="1.6" stroke-dasharray="4 4" opacity=".9"/>
    <circle cx="${x(last).toFixed(1)}" cy="${y(vals[last]).toFixed(1)}" r="4" fill="var(--accent)" stroke="var(--surface)" stroke-width="2"/>${xl}
    <line id="cx" x1="0" y1="${mt}" x2="0" y2="${mt+ph}" stroke="var(--axis)" opacity="0"/><circle id="cd" r="4" fill="var(--accent)" stroke="var(--surface)" stroke-width="2" opacity="0"/>
    <rect x="${ml}" y="${mt}" width="${pw}" height="${ph}" fill="transparent" id="hit"/></svg>
    <div class="psub" style="margin-top:8px"><span style="color:var(--accent)">━</span> diário &nbsp; <span style="color:var(--accent-ink)">┄</span> média 7 dias</div>`;
  document.getElementById("trendSub").textContent=`${M.l} · ${daily.length} dias`+(PERIOD_DAYS[state.period]<7?" (contexto)":"");
  const svg=document.getElementById("tsvg"),hit=document.getElementById("hit"),cx=document.getElementById("cx"),cd=document.getElementById("cd"),tt=document.getElementById("tt");
  function mv(e){const r=svg.getBoundingClientRect(),px=(e.clientX-r.left)/r.width*W;let i=Math.round((px-ml)/pw*(daily.length-1));i=Math.max(0,Math.min(daily.length-1,i));
    cx.setAttribute("x1",x(i));cx.setAttribute("x2",x(i));cx.setAttribute("opacity",".7");cd.setAttribute("cx",x(i));cd.setAttribute("cy",y(vals[i]));cd.setAttribute("opacity","1");
    tt.style.opacity="1";tt.style.left=Math.min(e.clientX+14,innerWidth-160)+"px";tt.style.top=(e.clientY-10)+"px";
    tt.innerHTML=`<div class="d">${new Date(daily[i].d+"T00:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"short"})}</div><div class="m">${M.fmt(vals[i])}</div>`;}
  hit.addEventListener("mousemove",mv);hit.addEventListener("mouseleave",()=>{cx.setAttribute("opacity","0");cd.setAttribute("opacity","0");tt.style.opacity="0";});
  hit.addEventListener("touchmove",e=>{if(e.touches[0])mv(e.touches[0]);},{passive:true});
}
function bars(id,rows,fmt){const max=Math.max(...rows.map(r=>r.v),1);document.getElementById(id).innerHTML=rows.map(r=>`<div class="bar-row"><div class="lbl" title="${r.l}">${r.l}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(r.v/max*100,1.5)}%"></div></div><div class="val">${fmt(r.v)}</div></div>`).join("");}
function renderOverviewCharts(A){
  bars("c1",BUCKETS.map(b=>({l:BKL[b],v:agg(A.filter(a=>a.bucket===b)).spend})).filter(r=>r.v>0).sort((a,b)=>b.v-a.v),BRL0);
  const rows=[{l:"ThruPlays",v:A.reduce((s,a)=>s+(a.bucket==="conteudo"?a.objV:0),0)},{l:"Visitas perfil",v:A.reduce((s,a)=>s+(a.bucket==="seguidores"?a.objV:0),0)},{l:"Cliques (evento)",v:A.reduce((s,a)=>s+((a.act&&a.act.lc)||0),0)},{l:"Checkouts",v:A.reduce((s,a)=>s+((a.act&&a.act.ck)||0),0)},{l:"Leads",v:A.reduce((s,a)=>s+a.leadN,0)},{l:"Compras",v:A.reduce((s,a)=>s+((a.act&&a.act.pu)||0),0)}].filter(r=>r.v>0).sort((a,b)=>b.v-a.v);
  bars("c2",rows,NUM);
}
// campaigns table
let cSort="spend",cDir=-1;
function renderCampTable(camps){
  const t=document.getElementById("ctbl");document.getElementById("campsub").textContent=camps.length+" campanhas · clique no cabeçalho p/ ordenar";
  if(!camps.length){t.innerHTML=`<tbody><tr><td colspan="8"><div class="empty">Sem campanhas neste filtro/período.</div></td></tr></tbody>`;return;}
  const cols=[["name","Campanha (nome completo)"],["bucket","Ação"],["spend","Gasto"],["reach","Alcance"],["cpm","CPM"],["ctr","CTR"],["cpc","CPC"],["objV","Objetivo"]];
  const s=camps.slice().sort((a,b)=>{if(cSort==="name")return cDir*a.name.localeCompare(b.name);if(cSort==="bucket")return cDir*a.bucket.localeCompare(b.bucket);return cDir*((a[cSort]||0)-(b[cSort]||0));});
  t.innerHTML=`<thead><tr>${cols.map(([k,l])=>`<th data-k="${k}" class="${cSort===k?"sorted":""}">${l}${cSort===k?(cDir<0?" ↓":" ↑"):""}</th>`).join("")}</tr></thead><tbody>${s.map(c=>`<tr>
    <td><div class="cfull">${c.name}</div><span class="tag">${c.product}${c.anyActive?"":" · pausada"}</span></td>
    <td><span class="bk">${BKL[c.bucket]}</span></td><td>${BRL(c.spend)}</td><td>${NUM(c.reach)}</td><td>${BRL(c.cpm)}</td><td>${PCT(c.ctr)}</td><td>${BRL(c.cpc)}</td>
    <td>${c.objV>0?NUM(c.objV)+' <span class="tag">'+c.objLabel+'</span>':"—"}</td></tr>`).join("")}</tbody>`;
  t.querySelectorAll("th").forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(cSort===k)cDir*=-1;else{cSort=k;cDir=(k==="name"||k==="bucket")?1:-1;}renderCampTable(camps);});
}
// creatives table (inclui pausados, no topo os desativados)
let rSort="status",rDir=1;
function renderCrTable(list){
  const t=document.getElementById("crtbl"),sub=document.getElementById("crsub");
  if(!list.length){sub.textContent="";t.innerHTML=`<tbody><tr><td colspan="8"><div class="empty">Nenhum criativo neste filtro/período.</div></td></tr></tbody>`;return;}
  const anyObj=list.some(c=>c.objV>0),micro=state.action!=="geral"&&PRIMARY[state.action]?.micro;
  const useObj=anyObj&&!micro;
  const best=useObj?list.filter(c=>c.objV>0).slice().sort((a,b)=>(a.spend/a.objV)-(b.spend/b.objV))[0]:list.slice().sort((a,b)=>b.ctr-a.ctr||b.spend-a.spend)[0];
  sub.textContent="inclui pausados · ★ = "+(useObj?"maior impacto no objetivo":"maior CTR c/ gasto")+" · clique p/ ordenar";
  const objHdr=state.action==="geral"?"Resultado":(useObj?PRIMARY[state.action].label:"CTR");
  const cols=[["cname","Criativo"],["status","Status"],["spend","Gasto"],["ctr","CTR"],["cpc","CPC"],["cpm","CPM"],["hook","Hook"],["objV",objHdr]];
  // sort: default status (pausados no topo), depois por gasto
  const s=list.slice().sort((a,b)=>{
    if(rSort==="status"){const av=a.status==="ACTIVE"?1:0,bv=b.status==="ACTIVE"?1:0;if(av!==bv)return av-bv;return b.spend-a.spend;}
    if(rSort==="cname")return rDir*a.name.localeCompare(b.name);
    return rDir*(((a[rSort]==null?-1:a[rSort]))-((b[rSort]==null?-1:b[rSort])));});
  t.innerHTML=`<thead><tr>${cols.map(([k,l])=>`<th data-k="${k}" class="${rSort===k?"sorted":""}">${l}${rSort===k?(rDir<0?" ↓":" ↑"):""}</th>`).join("")}</tr></thead><tbody>${s.map(c=>{
    const isB=c===best;const oc=c.objV>0?`${NUM(c.objV)} <span class="tag">${c.objLabel}</span>`:(state.action!=="geral"&&!useObj?PCT(c.ctr):(c.fo?NUM(c.fo)+' <span class="tag">seg.</span>':"—"));
    return `<tr class="${isB?"best":""}"><td><div class="crn">${isB?'<span class="star">★</span>':""}${c.name}</div><span class="tag">${c.product}${c.fo?" · "+c.fo+" seg.":""}</span></td>
      <td><span class="st ${c.status==="ACTIVE"?"on":"off"}">${c.status==="ACTIVE"?"ativo":"pausado"}</span></td>
      <td>${BRL(c.spend)}</td><td>${PCT(c.ctr)}</td><td>${BRL(c.cpc)}</td><td>${BRL(c.cpm)}</td>
      <td>${c.hook!=null?PCT(c.hook):"—"}</td><td>${oc}</td></tr>`;}).join("")}</tbody>`;
  t.querySelectorAll("th").forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(rSort===k)rDir*=-1;else{rSort=k;rDir=(k==="cname")?1:-1;}renderCrTable(list);});
}
// video retention table
function renderVideoTable(list){
  const vids=list.filter(c=>c.vid).sort((a,b)=>b.spend-a.spend);
  const w=document.getElementById("vidwrap");
  if(!vids.length){w.innerHTML="";return;}
  w.innerHTML=`<div class="tblwrap"><div class="tblhead"><h3>Retenção de vídeo</h3><span class="sub">hook rate, ThruPlay e retenção por quartil — só criativos em vídeo</span></div><div class="scroll"><table>
    <thead><tr><th>Criativo</th><th>Gasto</th><th>Hook (3s÷impr)</th><th>ThruPlay%</th><th>Repr. 3s</th><th>25%</th><th>50%</th><th>75%</th><th>95%</th></tr></thead>
    <tbody>${vids.map(c=>{const v=c.vid;return `<tr><td><div class="crn">${c.name}</div><span class="tag">${c.product}</span></td><td>${BRL(c.spend)}</td><td>${PCT(c.hook)}</td><td>${PCT(c.thruRate)}</td><td>${NUM(v.h||0)}</td><td>${NUM(v.q25||0)}</td><td>${NUM(v.q50||0)}</td><td>${NUM(v.q75||0)}</td><td>${NUM(v.q95||0)}</td></tr>`;}).join("")}</tbody></table></div></div>`;
}
function notes(){return `<div class="notes">
  <div class="row"><span>◆</span><span><b>Período.</b> Todo o painel (KPIs, campanhas, criativos, vídeo) responde ao período selecionado (hoje / ontem / 7 / 30 / 90 dias). A tendência mostra a série diária da conta na janela.</span></div>
  <div class="row"><span>◆</span><span><b>Objetivo pela nomenclatura</b> lido do nome da campanha; sem disparo relevante, cai para <b>CTR + gasto</b>. <b>★</b> marca o criativo de maior impacto. Criativos <b>pausados entram no topo</b> da lista.</span></div>
  <div class="row"><span>◆</span><span><b>Vídeo:</b> hook rate = reproduções de 3s ÷ impressões; retenção em 25/50/75/95% (contagens). <b>Seguidores</b> = follows/curtidas atribuídos aos anúncios.</span></div>
  <div class="row"><span>◆</span><span><b>Low Ticket:</b> a tabela de nomes completos revela que "Low Ticket", "Empresário c/ Tempo" e "Manual PME" compartilham criativos (série CHINA/ECT) — útil para corrigir a nomenclatura. <b>Vendas faturadas e WhatsApp</b> virão do RD Station.</span></div>
</div>`;}
const root=document.documentElement;
document.getElementById("themeBtn").onclick=()=>{const c=root.getAttribute("data-theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");root.setAttribute("data-theme",c==="dark"?"light":"dark");if(DATA)renderTrend();};
fetch("./data.json?_="+Date.now()).then(r=>{if(!r.ok)throw new Error(r.status);return r.json();}).then(boot).catch(e=>{document.getElementById("app").innerHTML=`<div class="err"><b>Não consegui carregar o data.json.</b> No GitHub Pages ele é servido junto. Para pré-visualizar local, use um servidor (Live Server). Detalhe: ${e.message}</div>`;});
</script>
